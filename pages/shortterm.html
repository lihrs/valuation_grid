<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7天短线 · 短线策略工具</title>
    <link rel="stylesheet" href="../static/css/common.css">
    <style>
        /* ========== 导航栏 ========== */
        .nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .nav-btn {
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            color: #6b7280;
            background: #f3f4f6;
            transition: all .15s;
        }
        .nav-btn:hover { background: #e5e7eb; color: #374151; }
        .nav-btn.active { background: #4f46e5; color: #fff; }

        /* ========== 策略说明 ========== */
        .strategy-info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
        }
        .strategy-info h4 { margin: 0 0 8px; font-size: 13px; color: #1e40af; }
        .strategy-info ul { margin: 0; padding-left: 18px; }
        .strategy-info li { font-size: 11px; color: #3b82f6; margin-bottom: 3px; line-height: 1.5; }

        /* ========== 配置面板 ========== */
        .config-panel {
            background: #fff;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
        }
        .config-header:hover { background: #f8fafc; }
        .config-header h3 { margin: 0; font-size: 14px; color: #1e293b; }
        .config-header .toggle-icon {
            font-size: 12px;
            color: #9ca3af;
            transition: transform 0.2s;
        }
        .config-panel.collapsed .toggle-icon { transform: rotate(-90deg); }
        .config-body {
            padding: 0 16px 14px;
            display: none;
        }
        .config-panel.expanded .config-body { display: block; }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .config-item label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; }
        .config-item input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 12px;
        }
        .config-item input:focus { border-color: #4f46e5; outline: none; }
        .config-item .hint { font-size: 10px; color: #9ca3af; margin-top: 2px; }
        .config-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #e5e7eb; }

        /* ========== 信号面板 ========== */
        .signal-panel { margin-top: 10px; }
        .signal-card {
            background: #fff;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            overflow: hidden;
            border-left: 4px solid #6b7280;
        }
        .signal-card.buy { border-left-color: #10b981; }
        .signal-card.sell { border-left-color: #ef4444; }
        .signal-card.stop-loss { border-left-color: #dc2626; background: #fef2f2; }
        .signal-card.take-profit { border-left-color: #f59e0b; }

        .signal-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e5e7eb;
        }
        .signal-card-header .fund-info { display: flex; align-items: center; gap: 6px; }
        .signal-card-header .code {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
            font-weight: 600;
            color: #4f46e5;
        }
        .signal-card-header .name { font-size: 12px; color: #6b7280; }
        .signal-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .signal-badge.sell { background: #fee2e2; color: #dc2626; }
        .signal-badge.buy { background: #d1fae5; color: #059669; }
        .signal-badge.hold { background: #f3f4f6; color: #6b7280; }

        .signal-card-body { padding: 10px 14px; }
        .signal-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .signal-metrics .metric { display: flex; gap: 4px; }
        .signal-metrics .label { color: #9ca3af; }
        .signal-metrics .value { font-weight: 600; color: #374151; }
        .signal-metrics .value.up { color: #dc2626; }
        .signal-metrics .value.down { color: #059669; }

        .signal-reason {
            font-size: 12px;
            color: #374151;
            line-height: 1.5;
            padding: 6px 10px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .signal-reason.warning { background: #fef3c7; border-color: #fde68a; }
        .signal-reason.danger { background: #fee2e2; border-color: #fecaca; }

        .signal-amount {
            font-size: 14px;
            font-weight: 700;
            color: #059669;
            margin-bottom: 8px;
        }
        .signal-amount.sell { color: #dc2626; }

        .signal-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 8px;
            border-top: 1px solid #f1f5f9;
        }
        .signal-actions button {
            padding: 5px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
            font-size: 11px;
            transition: all .15s;
        }
        .signal-actions button:hover { background: #f3f4f6; }
        .signal-actions .buy-btn { border-color: #10b981; color: #059669; }
        .signal-actions .buy-btn:hover { background: #ecfdf5; }
        .signal-actions .sell-btn { border-color: #ef4444; color: #dc2626; }
        .signal-actions .sell-btn:hover { background: #fef2f2; }

        /* ========== 弹窗样式 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            max-width: 420px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin: 0 0 16px; font-size: 16px; color: #1e293b; }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .trade-form > div { margin-bottom: 12px; }
        .trade-form label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .trade-form input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
        }
        .trade-form input:focus { border-color: #4f46e5; outline: none; }
        .trade-form .hint { font-size: 10px; color: #9ca3af; margin-top: 4px; }

        /* ========== 添加基金弹窗 ========== */
        #addFundList {
            max-height: 300px;
            overflow-y: auto;
        }
        .fund-option {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s;
        }
        .fund-option:hover { background: #f3f4f6; }
        .fund-option .code {
            font-family: "SF Mono", Monaco, monospace;
            font-weight: 600;
            color: #4f46e5;
            min-width: 60px;
        }
        .fund-option .name { flex: 1; font-size: 12px; color: #374151; margin: 0 8px; }
        .fund-option .sector { font-size: 11px; color: #9ca3af; }

        /* ========== 按钮样式 ========== */
        .btn-primary { background: #4f46e5; color: #fff; border: none; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #fff; color: #6b7280; border: 1px solid #e5e7eb; }
        .btn-secondary:hover { background: #f3f4f6; }
        .btn-success { background: #10b981; color: #fff; border: none; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: #fff; border: none; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #fff; border: none; }

        /* ========== 空状态 ========== */
        .empty { text-align: center; padding: 40px 20px; color: #9ca3af; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        /* ========== 更新时间 ========== */
        .update-time { font-size: 11px; color: #9ca3af; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <a href="real-time.html" class="nav-btn">实时估值</a>
            <a href="strategy.html" class="nav-btn">低频网格</a>
            <a href="shortterm.html" class="nav-btn active">⚡ 7天短线</a>
            <a href="recommend.html" class="nav-btn">💡 推荐买入</a>
        </div>

        <h1>⚡ 7天短线策略</h1>

        <!-- 策略说明 -->
        <div class="strategy-info">
            <h4>📌 策略特点</h4>
            <ul>
                <li><b>快进快出</b>：持仓周期1-7天，适合热点追踪</li>
                <li><b>目标止盈</b>：盈利5%即卖出落袋为安</li>
                <li><b>分批止盈</b>：15%减1/3，20%再减1/3</li>
                <li><b>回撤止盈</b>：峰值回撤5%清仓锁定收益</li>
                <li><b>严格止损</b>：浮亏10%止损，最多容忍15%</li>
                <li><b>冷却期</b>：止损后观察14天再介入</li>
            </ul>
        </div>

        <!-- 配置面板 -->
        <div class="config-panel collapsed" id="configPanel">
            <div class="config-header" onclick="toggleConfigPanel()">
                <h3>⚙️ 策略配置（可调）</h3>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="config-body">
                <div class="config-grid" id="configGrid">
                    <!-- 动态渲染 -->
                </div>
                <div class="config-actions">
                    <button class="btn-primary" onclick="saveConfig()">保存配置</button>
                    <button class="btn-secondary" onclick="resetConfig()" style="padding:5px 12px;font-size:11px;">恢复默认</button>
                </div>
            </div>
        </div>

        <div class="status" id="status"></div>

        <!-- 信号面板 -->
        <div class="signal-panel" id="signalPanel">
            <div class="empty">
                <div class="empty-icon">⚡</div>
                <p>加载中...</p>
            </div>
        </div>

        <div class="update-time" id="updateTime"></div>
    </div>

    <!-- 买入弹窗 -->
    <div class="modal" id="buyModal">
        <div class="modal-content">
            <h3 id="buyModalTitle">买入</h3>
            <div class="trade-form">
                <div>
                    <label>买入日期</label>
                    <input type="date" id="buyDate">
                </div>
                <div>
                    <label>买入金额（元）</label>
                    <input type="number" id="buyAmount" placeholder="建议30%仓位" step="100">
                </div>
                <div>
                    <label>确认净值（选填）</label>
                    <input type="number" id="buyNav" placeholder="T+1确认后补录" step="0.0001">
                    <div class="hint">净值通常T+1确认</div>
                </div>
                <div>
                    <label>备注</label>
                    <input type="text" id="buyNote" placeholder="如：短线追热点">
                </div>
                <div>
                    <label>仓位上限（元）</label>
                    <input type="number" id="buyMaxPosition" value="5000" step="100">
                </div>
            </div>
            <input type="hidden" id="buyFundCode">
            <input type="hidden" id="buyFundName">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('buyModal')">取消</button>
                <button class="btn-success" onclick="submitBuy()">确认买入</button>
            </div>
        </div>
    </div>

    <!-- 卖出弹窗 -->
    <div class="modal" id="sellModal">
        <div class="modal-content">
            <h3 id="sellModalTitle">卖出</h3>
            <div class="trade-form">
                <div>
                    <label>卖出日期</label>
                    <input type="date" id="sellDate">
                </div>
                <div>
                    <label>卖出份额</label>
                    <input type="number" id="sellShares" placeholder="卖出份额" step="0.01">
                    <div class="hint" id="sellHint"></div>
                </div>
                <div>
                    <label>确认净值（选填）</label>
                    <input type="number" id="sellNav" placeholder="T+1确认后补录" step="0.0001">
                </div>
            </div>
            <input type="hidden" id="sellFundCode">
            <input type="hidden" id="sellBatchId">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('sellModal')">取消</button>
                <button class="btn-danger" onclick="submitSell()">确认卖出</button>
            </div>
        </div>
    </div>

    <!-- 添加基金弹窗 -->
    <div class="modal" id="addFundModal">
        <div class="modal-content">
            <h3>添加基金</h3>
            <div class="trade-form">
                <div>
                    <label>基金代码</label>
                    <input type="text" id="addFundCode" placeholder="输入6位基金代码" maxlength="6" style="font-family:monospace;">
                    <div class="hint">输入基金代码后将自动获取基金名称</div>
                </div>
                <div id="fundPreview" style="display:none;padding:10px;background:#f8fafc;border-radius:6px;margin-top:8px;">
                    <span style="font-weight:600;color:#4f46e5;" id="previewCode"></span>
                    <span style="color:#374151;margin-left:8px;" id="previewName"></span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('addFundModal')">取消</button>
                <button class="btn-primary" id="confirmAddFundBtn" onclick="confirmAddFund()" disabled>确认添加</button>
            </div>
        </div>
    </div>

    <!-- 引入独立的前端JS -->
    <script src="../static/js/shortterm.js"></script>
</body>
</html>
